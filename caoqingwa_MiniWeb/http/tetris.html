<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>俄罗斯方块</title>
    <link rel="stylesheet" href="tetris.css">
</head>
<body>
    <h1>俄罗斯方块</h1>
    <div style="margin-bottom:10px;">
        <strong>操作说明：</strong><br>
        ← →：左右移动<br>
        ↓：快速下落<br>
        Q：逆时针旋转<br>
        E：顺时针旋转
    </div>
    <div id="status" style="margin-bottom:10px;">
        <strong>分数：</strong> <span id="score">0</span>
        &nbsp;&nbsp; <strong>消行：</strong> <span id="lines">0</span>
    </div>
    <div id="game-wrap">
        <canvas id="tetris" width="240" height="400"></canvas>
        <div id="game-over" hidden>
            <div class="game-over-card">
                <h2>游戏失败</h2>
                <p>当前分数：<span id="final-score">0</span></p>
                <button id="restart-btn" type="button">重新开始</button>
            </div>
        </div>
    </div>
    <script src="tetris.js"></script>
</body>
</html>
